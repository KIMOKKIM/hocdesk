# TargetBridge AI — teomokdesk.pe.kr 서브경로 전용
# 기존 teomokdesk.pe.kr 루트(/) 서비스는 변경하지 않습니다.
#
# 설치: sudo cp deploy/nginx-targetbridge.conf /etc/nginx/snippets/targetbridge.conf
#       server { ... } 블록에 include snippets/targetbridge.conf; 추가
# 검증: sudo nginx -t && sudo systemctl reload nginx

# Next.js basePath=/targetbridge — upstream에 전체 URI 전달
location /targetbridge {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
}

location /targetbridge/_next/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 7d;
    add_header Cache-Control "public, immutable";
}
