# DEPRECATED — Vercel 배포에서는 사용하지 않습니다.
# 현재 운영: https://hocdesk.pe.kr/Jinwoong (basePath /Jinwoong)
# 최신 가이드: DEPLOYMENT-VERCEL.md
#
# 아래는 구버전 자체 서버(Nginx + Node) 참고용입니다.
# teomokdesk.pe.kr /targetbridge → 현재는 hocdesk.pe.kr /Jinwoong

# 설치 예 (구버전, 사용 비권장):
# sudo cp deploy/nginx-targetbridge.conf /etc/nginx/snippets/targetbridge-jinwoong.conf

# Next.js basePath=/Jinwoong — upstream에 전체 URI 전달
location /Jinwoong {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
}

location /Jinwoong/_next/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 7d;
    add_header Cache-Control "public, immutable";
}
